services:
  apache-php:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./www:/var/www/html
      - ./config/apache/000-default.conf:/etc/apache2/sites-enabled/000-default.conf
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_NAME: ${DB_NAME:-app}
      DB_USER: ${DB_USER:-app}
      DB_PASS: ${DB_PASS:-secret}

  mariadb:
    image: mariadb:${MARIADB_VERSION:-11}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./config/mariadb/custom.cnf:/etc/mysql/conf.d/custom.cnf
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
      MARIADB_DATABASE: ${DB_NAME:-app}
      MARIADB_USER: ${DB_USER:-app}
      MARIADB_PASSWORD: ${DB_PASS:-secret}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
