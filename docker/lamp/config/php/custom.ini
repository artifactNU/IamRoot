; PHP configuration overrides
; Adjust values to suit your application

upload_max_filesize = 64M
post_max_size       = 64M
memory_limit        = 256M
max_execution_time  = 120

; Development defaults — set display_errors = Off in production
display_errors  = On
error_reporting = E_ALL

[opcache]
opcache.enable     = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
