# group_vars/all.yml — variables applied to every host.
# Secrets use the vault_ prefix and are stored encrypted via ansible-vault.
# This file shows structure only — no real values here.

# Timezone
system_timezone: "Europe/Stockholm"

# NTP servers
ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"

