# Example inventory — placeholder values only.
# Copy this file to inventories/local/hosts.ini and replace with real hosts.
#
# IPs use RFC 5737 documentation ranges (192.0.2.x, 198.51.100.x, 203.0.113.x).
# These are never routable and make it obvious this is example content.

[webservers]
web01.example.com ansible_host=192.0.2.11
web02.example.com ansible_host=192.0.2.12

[dbservers]
db01.example.com ansible_host=198.51.100.11

[monitoring]
mon01.example.com ansible_host=203.0.113.11

[all:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3
